name: Push Notifications Cron

on:
  schedule:
    - cron: "20 4 * * *"    # 07:20
    - cron: "30 5 * * *"    # 08:30
    - cron: "0 7 * * *"    # 10:00
    - cron: "0 9 * * *"    # 12:00
    - cron: "30 11 * * *"   # 14:30
    - cron: "30 13 * * *"   # 16:30
    - cron: "42 15 * * *"   # 18:42
    - cron: "15 17 * * *"   # 20:15
    - cron: "30 19 * * *"   # 22:30
  workflow_dispatch:

jobs:
  trigger-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify Function
        run: |
          curl -X GET "https://superb-pie-79e20a.netlify.app/.netlify/functions/push"
