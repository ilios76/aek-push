name: Push Notifications Cron

on:
 schedule:
  - cron: "0 2 * * *"     # 09:00 GR
  - cron: "0 6 * * *"     # 09:00 GR
  - cron: "0 8 * * *"    # 13:00 GR
  - cron: "0 10 * * *"    # 13:00 GR
  - cron: "0 12 * * *"    # 13:00 GR
  - cron: "0 14 * * *"    # 17:00 GR
  - cron: "0 16 * * *"    # 13:00 GR
  - cron: "0 18 * * *"    # 21:00 GR
  - cron: "0 20 * * *"    # 13:00 GR
  - cron: "0 00 * * *"    # 13:00 GR
  - cron: "0 3 * * *"    # 13:00 GR
  workflow_dispatch:

jobs:
  trigger-push:
    runs-on: ubuntu-latest
    steps:
      - name: Call Netlify Function
        run: |
          curl -X GET "https://superb-pie-79e20a.netlify.app/.netlify/functions/push?t=$(date +%s)"

